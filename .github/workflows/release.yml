name: "publish"

on:
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev

      - name: install frontend dependencies
        run: npm install

      - name: check types
        run: npm run check

      - name: setup sidecar ffmpeg
        shell: bash
        run: |
          npm install --no-save ffmpeg-static
          cat << 'EOF' > setup-sidecar.js
          import fs from 'fs';
          import { dirname, join } from 'path';
          import ffmpegRaw from 'ffmpeg-static';
          const ffmpeg = ffmpegRaw.default || ffmpegRaw;
          
          const platform = process.platform;
          let target = '';
          if (platform === 'darwin') target = 'aarch64-apple-darwin';
          else if (platform === 'linux') target = 'x86_64-unknown-linux-gnu';
          else target = 'x86_64-pc-windows-msvc';
          
          const ext = platform === 'win32' ? '.exe' : '';
          const dest = join('src-tauri', 'binaries', `ffmpeg-${target}${ext}`);
          
          fs.mkdirSync(dirname(dest), { recursive: true });
          if (!fs.existsSync(dest)) {
            console.log(`Copying FFmpeg to ${dest}`);
            fs.copyFileSync(ffmpeg, dest);
          } else {
            console.log(`FFmpeg sidecar already exists at ${dest}`);
          }
          EOF
          node setup-sidecar.js

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action automatically replaces this with the version from tauri.conf.json
          releaseName: "Memory Card v__VERSION__"
          releaseBody: "See the assets below for the installers."
          releaseDraft: true
          prerelease: false
